name: Linux

on:
  push:
    paths:
    - '.github/workflows/**'
    - 'JuceLibraryCode/**'
    - 'PluginGenerator/**'
    - 'Plugins/**'
    - 'Resources/**'
    - 'Source/**'
    - 'CMakeLists.txt'
    - 'HelperFunctions.cmake'
  pull_request:
    paths:
    - '.github/workflows/**'
    - 'JuceLibraryCode/**'
    - 'PluginGenerator/**'
    - 'Plugins/**'
    - 'Resources/**'
    - 'Source/**'
    - 'CMakeLists.txt'
    - 'HelperFunctions.cmake'

jobs:
  build-ubuntu:

    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: build
      env:
        CC: gcc-10
        CXX: g++-10
      run: |
        sudo apt update
        cd Resources/Scripts
        sudo ./install_linux_dependencies.sh
        cd ../../Build && cmake -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release ..
        make -j4
    - name: deploy
      env:
        ARTIFACTORY_ACCESS_TOKEN: ${{ secrets.ARTIFACTORY_ACCESS_TOKEN }}
      run: |
        gui_ver=v$(grep -w CMakeLists.txt -e 'GUI_VERSION' | grep -Eo "[0-9]+\.[0-9]+\.[0-9]+(-([0-9A-Za-z\.-]+))?")

        if [ ${{github.ref_name}} == 'development' ]; then
          version_suffix=-dev
          artifactory_repo=Dev
          gui_ver=latest
        elif [ ${{github.ref_name}} == 'testing' ]; then
          version_suffix=-beta
          artifactory_repo=Test
        elif [ ${{github.ref_name}} == 'main' ]; then
          artifactory_repo=Release
        else
          echo "This branch is not configured for deployment."
          exit 0
        fi

        cd Build
        cp -r Release snap
        cp ../LICENSE snap
        zipfile=snap-${gui_ver}-linux${version_suffix}.zip
        zip -r $zipfile snap
        user_info="X-JFrog-Art-Api:$ARTIFACTORY_ACCESS_TOKEN"
        curl -H $user_info -T $zipfile "https://openephys.jfrog.io/artifactory/GUI-binaries/${artifactory_repo}/linux/$zipfile"

        cd ../Resources/Installers/Linux/Open-Ephys_Installer
        mkdir -p usr/local/bin/snap-neuro
        cp -r ../../../../Build/Release/* usr/local/bin/snap-neuro
        cp ../../../Icons/icon-large.png usr/local/bin/snap-neuro
        cp ../../../Scripts/*.rules usr/local/bin/snap-neuro
        mkdir -p usr/share/applications
        cp open-ephys.desktop usr/share/applications/snap-neuro.desktop
        cd ..
        dpkg-deb --build Open-Ephys_Installer
        installer=snap-neuro-${gui_ver}${version_suffix}.deb
        mv -v Open-Ephys_Installer.deb $installer
        curl -H $user_info -T $installer "https://openephys.jfrog.io/artifactory/GUI-binaries/${artifactory_repo}-Installer/linux/$installer"
      shell: bash
